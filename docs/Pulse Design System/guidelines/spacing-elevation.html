<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Warm-tinted shadow scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:26px;font-family:var(--font-sans)}
.row{display:flex;gap:24px}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:92px;height:62px;background:var(--surface-card);border-radius:var(--radius-md)}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm ·cards</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md ·hover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg ·popover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl ·modal</span></div>
</div>
</body></html>
