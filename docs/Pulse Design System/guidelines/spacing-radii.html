<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="xs 4 → 2xl 24 → full" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-sans)}
.row{display:flex;gap:16px;align-items:flex-end}
.col{display:flex;flex-direction:column;align-items:center;gap:7px}
.box{width:62px;height:62px;background:var(--teal-50);border:1.5px solid var(--brand)}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="t">xs · 4</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="t">sm · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="t">md · 8</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="t">lg · 12</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="t">xl · 16</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="t">2xl · 24</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-full)"></div><span class="t">full</span></div>
</div>
</body></html>
