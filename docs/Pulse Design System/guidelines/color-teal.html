<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Teal scale" subtitle="Primary teal — #01696f is the brand" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:20px;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
.sw b{font-size:11px;font-weight:600}.sw span{font-family:var(--font-mono);font-size:10px;opacity:.8}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--teal-50);color:#014f54"><b>50</b><span>#e7f1f1</span></div>
  <div class="sw" style="background:var(--teal-100);color:#014f54"><b>100</b><span>#c6dedf</span></div>
  <div class="sw" style="background:var(--teal-300);color:#fff"><b>300</b><span>#6daab0</span></div>
  <div class="sw" style="background:var(--teal-400);color:#fff"><b>400</b><span>#4f98a3</span></div>
  <div class="sw" style="background:var(--teal-600);color:#fff"><b>600 ·brand</b><span>#01696f</span></div>
  <div class="sw" style="background:var(--teal-700);color:#fff"><b>700</b><span>#015358</span></div>
  <div class="sw" style="background:var(--teal-900);color:#fff"><b>900</b><span>#04292c</span></div>
</div>
</body></html>
