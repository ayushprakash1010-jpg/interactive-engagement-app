<!-- @dsCard group="Colors" viewport="700x170" name="Data palette" subtitle="Categorical sequence for poll bars & charts" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:20px;font-family:var(--font-sans)}
.bars{display:flex;flex-direction:column;gap:7px}
.bar{height:18px;border-radius:var(--radius-full)}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.chip{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.dot{width:11px;height:11px;border-radius:50%}</style></head>
<body>
<div class="bars">
  <div class="bar" style="width:96%;background:var(--data-1)"></div>
  <div class="bar" style="width:74%;background:var(--data-2)"></div>
  <div class="bar" style="width:58%;background:var(--data-3)"></div>
  <div class="bar" style="width:41%;background:var(--data-4)"></div>
  <div class="bar" style="width:29%;background:var(--data-5)"></div>
</div>
<div class="legend">
  <div class="chip"><span class="dot" style="background:var(--data-1)"></span>#01696f</div>
  <div class="chip"><span class="dot" style="background:var(--data-2)"></span>#4f98a3</div>
  <div class="chip"><span class="dot" style="background:var(--data-3)"></span>#6daa45</div>
  <div class="chip"><span class="dot" style="background:var(--data-4)"></span>#d19900</div>
  <div class="chip"><span class="dot" style="background:var(--data-5)"></span>#da7101</div>
  <div class="chip"><span class="dot" style="background:var(--data-6)"></span>#006494</div>
  <div class="chip"><span class="dot" style="background:var(--data-7)"></span>#7a39bb</div>
  <div class="chip"><span class="dot" style="background:var(--data-8)"></span>#a12c7b</div>
</div>
</body></html>
