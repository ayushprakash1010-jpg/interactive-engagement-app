<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & text" subtitle="Semantic aliases — use these, not raw scales" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:20px;font-family:var(--font-sans)}
.wrap{display:flex;gap:14px}
.stack{flex:1;display:flex;flex-direction:column;gap:6px}
.s{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary)}
.box{width:26px;height:26px;border-radius:6px;border:1px solid var(--border-default)}
code{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.txt{font-weight:600}</style></head>
<body>
<div class="wrap">
  <div class="stack">
    <div class="s"><span class="box" style="background:var(--surface-canvas)"></span><code>--surface-canvas</code></div>
    <div class="s"><span class="box" style="background:var(--surface-card)"></span><code>--surface-card</code></div>
    <div class="s"><span class="box" style="background:var(--surface-sunken)"></span><code>--surface-sunken</code></div>
    <div class="s"><span class="box" style="background:var(--surface-inverse)"></span><code>--surface-inverse</code></div>
  </div>
  <div class="stack">
    <div class="s"><span class="txt" style="color:var(--text-primary)">Primary text</span></div>
    <div class="s"><span class="txt" style="color:var(--text-secondary)">Secondary text</span></div>
    <div class="s"><span class="txt" style="color:var(--text-muted)">Muted text</span></div>
    <div class="s"><span class="txt" style="color:var(--text-link)">Link text</span></div>
  </div>
</div>
</body></html>
