<!-- @dsCard group="Colors" viewport="700x150" name="AI · Iris accent" subtitle="Reserved for AI-assisted surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:20px;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:60px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
.sw b{font-size:11px;font-weight:600}.sw span{font-family:var(--font-mono);font-size:10px;opacity:.8}
.grad{margin-top:12px;height:44px;border-radius:var(--radius-md);background:var(--ai-gradient);display:flex;align-items:center;padding:0 14px;color:#fff;font-size:12px;font-weight:600}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--iris-50);color:#4f2080"><b>50</b><span>#f1ebfa</span></div>
  <div class="sw" style="background:var(--iris-100);color:#4f2080"><b>100</b><span>#e2d3f5</span></div>
  <div class="sw" style="background:var(--iris-200);color:#4f2080"><b>200 ·border</b><span>#c4a7ea</span></div>
  <div class="sw" style="background:var(--iris-500);color:#fff"><b>500 ·ai</b><span>#7a39bb</span></div>
  <div class="sw" style="background:var(--iris-700);color:#fff"><b>700</b><span>#4f2080</span></div>
</div>
<div class="grad">AI gradient · iris → teal · --ai-gradient</div>
</body></html>
