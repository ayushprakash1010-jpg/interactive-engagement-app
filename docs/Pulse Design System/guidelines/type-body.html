<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-sans)}
.lead{font-size:18px;color:var(--text-primary);font-weight:500;line-height:1.4}

<body>
<div class="lead">Live polls, Q&amp;A, quizzes, and word clouds.</div>
<div class="p">Participants join with a code or QR — no app, no login. Results animate onto the big screen the moment votes land.</div>
<div class="lbl">Form label · 13px medium</div>
<div class="eyebrow">Real-time engagement</div>
</body></html>
