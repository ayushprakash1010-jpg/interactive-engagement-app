<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-sans)}
.row{display:flex;align-items:flex-end;gap:14px}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--brand);border-radius:3px;width:100%}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px;width:4px"></div><span class="t">1·4</span></div>
  <div class="col"><div class="bar" style="height:8px;width:8px"></div><span class="t">2·8</span></div>
  <div class="col"><div class="bar" style="height:12px;width:12px"></div><span class="t">3·12</span></div>
  <div class="col"><div class="bar" style="height:16px;width:16px"></div><span class="t">4·16</span></div>
  <div class="col"><div class="bar" style="height:24px;width:24px"></div><span class="t">6·24</span></div>
  <div class="col"><div class="bar" style="height:32px;width:32px"></div><span class="t">8·32</span></div>
  <div class="col"><div class="bar" style="height:48px;width:48px"></div><span class="t">12·48</span></div>
  <div class="col"><div class="bar" style="height:64px;width:64px"></div><span class="t">16·64</span></div>
</div>
</body></html>
