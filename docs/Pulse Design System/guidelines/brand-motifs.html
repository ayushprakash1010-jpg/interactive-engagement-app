<!-- @dsCard group="Brand" viewport="700x150" name="Live & AI motifs" subtitle="On-air pulse dot · AI sparkle gradient" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-sans);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--radius-full);font-size:13px;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:var(--live);animation:pulse-live 1.6s var(--ease-standard) infinite}
.live{background:var(--success-subtle);color:var(--green-600)}
.ai{background:var(--ai-gradient);color:#fff}
.aisub{background:var(--ai-subtle);color:var(--ai-subtle-text)}
svg{width:15px;height:15px}</style></head>
<body>
<span class="pill live"><span class="dot"></span>Live · 1,284 joined</span>
<span class="pill ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>Drafted by Pulse AI</span>
<span class="pill aisub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>AI generated</span>
</body></html>
