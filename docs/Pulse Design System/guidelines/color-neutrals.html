<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals · Warm sand" subtitle="Paper surfaces + warm-charcoal ink" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-canvas);padding:20px;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-default)}
.sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
.sw b{font-size:11px;font-weight:600}.sw span{font-family:var(--font-mono);font-size:10px;opacity:.75}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--sand-50);color:#45423b"><b>50</b><span>#faf9f6</span></div>
  <div class="sw" style="background:var(--sand-100);color:#45423b"><b>100</b><span>#f5f3ee</span></div>
  <div class="sw" style="background:var(--sand-200);color:#45423b"><b>200</b><span>#eae6df</span></div>
  <div class="sw" style="background:var(--sand-300);color:#45423b"><b>300 ·border</b><span>#ddd8cf</span></div>
  <div class="sw" style="background:var(--ink-700);color:#fff"><b>ink-700</b><span>#6f6b62</span></div>
  <div class="sw" style="background:var(--ink-900);color:#fff"><b>ink-900 ·text</b><span>#23211d</span></div>
</div>
</body></html>
