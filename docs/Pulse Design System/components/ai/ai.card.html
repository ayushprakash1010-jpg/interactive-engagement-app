<style>body{margin:0;background:var(--surface-canvas);padding:22px;font-family:var(--font-sans)}

<body><div id="root"></div>
<script type="text/babel">
const { AIComposer, AISummaryCard, SuggestionChip, AIBadge } = window.PulseDesignSystem_424f5e;
function Demo(){
  const [v,setV]=React.useState('Sprint retro for a team of 12');
  return (<div>
    <div className="sec"><p className="h">AI composer &nbsp;·&nbsp; <AIBadge label="AI"/></p>

    <div className="grid">
      <div className="sec"><p className="h">AI summary</p>

          footnote="Summarized from 142 open responses"/>
      </div>
      <div className="sec"><p className="h">Suggestions · generating</p>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <SuggestionChip text="Add a follow-up: “What would help most?”" onAccept={()=>{}} onDismiss={()=>{}}/>
          <SuggestionChip text="Group 6 similar questions into one" onAccept={()=>{}} onDismiss={()=>{}}/>
          <AISummaryCard shimmer/>
        </div>
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
