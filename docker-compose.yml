services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Secrets (Auth0 issuer/audience, etc.) are read from apps/api/.env.
    # The explicit `environment:` block below overrides it for docker-internal
    # hostnames so the localhost values in the .env file don't leak into the container.
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/iep
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      - api
    # Server-side Auth0 vars (AUTH0_SECRET, CLIENT_ID/SECRET, ISSUER, AUDIENCE,
    # BASE_URL) are needed at RUNTIME for host login — read from apps/web/.env.local.
    # NEXT_PUBLIC_* are baked at build time via the build args above; the
    # `environment:` block keeps them correct for the running container too.
    env_file:
      - apps/web/.env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Server-side calls (BFF proxy, SSR health) reach the API via its internal
      # docker hostname — the browser-facing NEXT_PUBLIC_* URLs stay on localhost.
      API_INTERNAL_URL: http://api:4000
    ports:
      - '3000:3000'

volumes:
  mongo-data:
  redis-data:
